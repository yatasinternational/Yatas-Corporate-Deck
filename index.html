<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zero-Flicker PDF Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        :root { --bg-color: #090d16; --container-bg: #020617; }
        body { background: var(--bg-color); margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        #book { position: relative; width: 100%; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        /* GPU Hızlandırması İçin Kritik */
        .canvas-container-layer {
            position: absolute; /* Üst üste bindirmek için */
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; /* Başlangıçta görünmez */
            transition: opacity 0.3s ease-in-out;
            will-change: opacity; /* GPU'yu tetikler */
        }

        .canvas-container-layer.active {
            opacity: 1; /* Sadece aktif olan görünür */
        }

        canvas {
            max-width: 90vw;
            max-height: 90vh;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            will-change: transform; /* Donanımsal hızlandırma */
        }
    </style>
</head>
<body>

    <div id="book"></div>

    <script>
        const pdfUrl = 'sample.pdf';
        let pdfDoc = null, currentIdx = 0;
        const book = document.getElementById('book');

        async function init() {
            pdfDoc = await pdfjsLib.getDocument(pdfUrl).promise;
            // İlk 2 sayfayı hemen render et (Ön yükleme)
            renderPage(0);
            renderPage(1);
        }

        async function renderPage(idx) {
            if (idx < 0 || idx >= pdfDoc.numPages || document.getElementById(`page-${idx}`)) return;

            const page = await pdfDoc.getPage(idx + 1);
            const container = document.createElement('div');
            container.id = `page-${idx}`;
            container.className = 'canvas-container-layer';
            
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            
            // Yüksek kalite ayarı
            const viewport = page.getViewport({ scale: 2.0 });
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            canvas.style.width = '80vw'; // Ekran oranına göre ayar

            await page.render({ canvasContext: context, viewport: viewport }).promise;
            
            container.appendChild(canvas);
            book.appendChild(container);
            
            if (idx === currentIdx) container.classList.add('active');
        }

        function showPage(idx) {
            document.querySelectorAll('.canvas-container-layer').forEach(el => el.classList.remove('active'));
            const target = document.getElementById(`page-${idx}`);
            if (target) {
                target.classList.add('active');
                currentIdx = idx;
                // İleriye dönük sayfayı pre-render et
                renderPage(idx + 1);
            }
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' && currentIdx < pdfDoc.numPages - 1) showPage(currentIdx + 1);
            if (e.key === 'ArrowLeft' && currentIdx > 0) showPage(currentIdx - 1);
        });

        init();
    </script>
</body>
</html>
