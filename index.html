<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Katalog Portalı</title>
    <!-- PDF.js Kütüphanesi -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: #0d0d0d;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
        }

        /* Sol Menü (Sidebar) */
        #sidebar {
            width: 320px;
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            z-index: 10;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #sidebar-header {
            padding: 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        #sidebar-header h1 {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #f5f5f7;
        }

        #catalog-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .catalog-item {
            padding: 14px 16px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.02);
            margin-bottom: 8px;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: all 0.2s ease;
            font-size: 0.9rem;
            color: #a1a1a6;
        }

        .catalog-item:hover, .catalog-item.active {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
            color: #ffffff;
        }

        /* Ana Sahne (Viewport) */
        #main-viewport {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #scene {
            flex: 1;
            position: relative;
            perspective: 1200px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: grab;
        }

        #scene:active {
            cursor: grabbing;
        }

        /* Zoom ve Pan Konteyneri */
        #zoom-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            transform-style: preserve-3d;
            transition: transform 0.1s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* 3D Kitap / Sayfa Yapısı */
        #book {
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .page-container {
            position: absolute;
            background: #1e1e1e;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.8), 0 0 1px rgba(255,255,255,0.2) inset;
            border-radius: 4px;
            overflow: hidden;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.6s ease;
            transform-origin: center center;
        }

        .page-canvas {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Kontrol Arayüzü */
        #controls-bar {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 20, 20, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 10px 24px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 10;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .control-btn {
            background: none;
            border: none;
            color: #a1a1a6;
            cursor: pointer;
            padding: 8px;
            font-size: 1rem;
            transition: color 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:hover {
            color: #ffffff;
        }

        #page-indicator {
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            color: #a1a1a6;
            min-width: 60px;
            text-align: center;
        }

        /* Yükleniyor Göstergesi */
        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
            background: rgba(0,0,0,0.8);
            padding: 12px 24px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            display: none;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- Sol Katalog Menüsü -->
    <div id="sidebar">
        <div id="sidebar-header">
            <h1>KOLEKSİYONLAR</h1>
        </div>
        <div id="catalog-list">
            <!-- Dinamik doldurulacak -->
        </div>
    </div>

    <!-- Ana Görsel Sahne -->
    <div id="main-viewport">
        <div id="loader">Yükleniyor...</div>
        
        <div id="scene">
            <div id="zoom-container">
                <div id="book">
                    <!-- Dinamik 3D sayfalar buraya eklenecek -->
                </div>
            </div>
        </div>

        <!-- Kontrol Paneli -->
        <div id="controls-bar">
            <button class="control-btn" id="prev-btn" title="Önceki Sayfa">◀</button>
            <div id="page-indicator">0 / 0</div>
            <button class="control-btn" id="next-btn" title="Sonraki Sayfa">▶</button>
            <div style="width: 1px; height: 16px; background: rgba(255,255,255,0.15);"></div>
            <button class="control-btn" id="zoom-out-btn" title="Uzaklaş">➖</button>
            <button class="control-btn" id="zoom-in-btn" title="Yakınlaş">➕</button>
        </div>
    </div>

    <script>
        // PDF.js worker yolunu tanımlıyoruz
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        // Ses Efekti Havuzu (Ses gecikmesini önlemek için)
        class AudioPool {
            constructor(src, size = 3) {
                this.pool = Array.from({ length: size }, () => {
                    const audio = new Audio(src);
                    audio.preload = 'auto';
                    return audio;
                });
                this.index = 0;
            }
            play() {
                const audio = this.pool[this.index];
                audio.currentTime = 0;
                audio.play().catch(() => {}); // Kullanıcı etkileşimi yoksa tarayıcı engelini sessizce geç
                this.index = (this.index + 1) % this.pool.length;
            }
        }

        const pageFlipSound = new AudioPool('https://assets.mixkit.co/active_storage/sfx/2568/2568-84.wav', 4);

        // Uygulama Durum Yönetimi (State)
        const state = {
            pdfDoc: null,
            currentPage: 1,
            totalPages: 0,
            renderedPages: new Map(), // Bellek sızıntısını önlemek için render edilenleri tutarız
            bookWidth: 0,
            bookHeight: 0
        };

        // Örnek Katalog Verileri
        const catalogs = [
            { name: "Yataş Bedding 2026 Koleksiyonu", url: "https://arxiv.org/pdf/2112.04426.pdf" }, // Test için kararlı bir ham PDF adresi
            { name: "Premium Tasarımlar & Trendler", url: "https://arxiv.org/pdf/2303.08774.pdf" }
        ];

        // Element Referansları
        const sidebarList = document.getElementById('catalog-list');
        const scene = document.getElementById('scene');
        const zoomContainer = document.getElementById('zoom-container');
        const book = document.getElementById('book');
        const pageIndicator = document.getElementById('page-indicator');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const zoomInBtn = document.getElementById('zoom-in-btn');
        const zoomOutBtn = document.getElementById('zoom-out-btn');
        const loader = document.getElementById('loader');

        // Zoom & Pan Değişkenleri (Mükemmel Simetrik Sınırlar İçin)
        let scale = 1;
        let posX = 0;
        let posY = 0;
        let isDragging = false;
        let startX, startY;
        let isPinching = false;
        let startDist = 0;

        // --- PDF YÜKLEME VE YÖNETİM ---
        
        function init() {
            // Katalog listesini oluştur
            catalogs.forEach((cat, index) => {
                const item = document.createElement('div');
                item.className = `catalog-item ${index === 0 ? 'active' : ''}`;
                item.textContent = cat.name;
                item.addEventListener('click', () => {
                    document.querySelectorAll('.catalog-item').forEach(el => el.classList.remove('active'));
                    item.classList.add('active');
                    loadPDF(cat.url);
                });
                sidebarList.appendChild(item);
            });

            // İlk kataloğu yükle
            loadPDF(catalogs[0].url);
        }

        async function loadPDF(url) {
            loader.style.display = 'block';
            resetZoom();
            
            // Eski render edilen sayfaları ve kanvasları bellekten temizle (Memory Cleanup)
            state.renderedPages.forEach(pageObj => {
                if (pageObj.canvas) {
                    pageObj.canvas.width = 0;
                    pageObj.canvas.height = 0;
                }
            });
            state.renderedPages.clear();
            book.innerHTML = '';

            try {
                state.pdfDoc = await pdfjsLib.getDocument(url).promise;
                state.totalPages = state.pdfDoc.numPages;
                state.currentPage = 1;
                
                // Kitap boyutlarını ilk sayfaya göre hesapla
                const firstPage = await state.pdfDoc.getPage(1);
                calculateBookDimensions(firstPage);

                // Sayfa kaplarını oluştur
                for (let i = 1; i <= state.totalPages; i++) {
                    createPageContainer(i);
                }

                updateBookDisplay();
            } catch (err) {
                console.error("PDF yükleme hatası:", err);
            } finally {
                loader.style.display = 'none';
            }
        }

        function calculateBookDimensions(pdfPage) {
            const viewport = pdfPage.getViewport({ scale: 1.0 });
            const sceneWidth = scene.clientWidth * 0.8;
            const sceneHeight = scene.clientHeight * 0.8;
            
            const scaleX = sceneWidth / viewport.width;
            const scaleY = sceneHeight / viewport.height;
            const fitScale = Math.min(scaleX, scaleY);

            state.bookWidth = viewport.width * fitScale;
            state.bookHeight = viewport.height * fitScale;

            book.style.width = `${state.bookWidth}px`;
            book.style.height = `${state.bookHeight}px`;
        }

        function createPageContainer(pageNum) {
            const container = document.createElement('div');
            container.className = 'page-container';
            container.id = `page-container-${pageNum}`;
            container.style.width = `${state.bookWidth}px`;
            container.style.height = `${state.bookHeight}px`;

            const canvas = document.createElement('canvas');
            canvas.className = 'page-canvas';
            container.appendChild(canvas);
            book.appendChild(container);

            state.renderedPages.set(pageNum, {
                container: container,
                canvas: canvas,
                rendered: false,
                rendering: false
            });
        }

        // --- ÇİFT TAMPONLU (DOUBLE-BUFFERED) YÜKSEK KALİTELİ RENDER ---
        
        async function renderHighQualityPage(pageNum) {
            const pageObj = state.renderedPages.get(pageNum);
            if (!pageObj || pageObj.rendered || pageObj.rendering) return;

            pageObj.rendering = true;

            try {
                const page = await state.pdfDoc.getPage(pageNum);
                const canvas = pageObj.canvas;
                
                // Ekran yoğunluğunu (DPR) hesaba katarak ultra keskin render yapısı
                const dpr = window.devicePixelRatio || 1;
                const baseViewport = page.getViewport({ scale: 1.0 });
                
                // Genişlik koruma sınırı: Aşırı RAM kullanımını ve iOS çökmelerini önlemek için maks 2048px limit
                let renderScale = (state.bookWidth / baseViewport.width) * dpr;
                if (baseViewport.width * renderScale > 2048) {
                    renderScale = 2048 / baseViewport.width;
                }

                const viewport = page.getViewport({ scale: renderScale });

                // Çift Tamponlama: Önce arka planda görünmez bir kanvasa çizip sonra aktarıyoruz
                const offscreenCanvas = document.createElement('canvas');
                offscreenCanvas.width = viewport.width;
                offscreenCanvas.height = viewport.height;
                const ctx = offscreenCanvas.getContext('2d');

                const renderContext = {
                    canvasContext: ctx,
                    viewport: viewport
                };

                await page.render(renderContext).promise;

                // Opsiyonel Fligran/Logo Ekleme (Hizalaması ve simetrisi kusursuz)
                ctx.save();
                ctx.fillStyle = "rgba(255, 255, 255, 0.15)";
                ctx.font = "bold 14px sans-serif";
                ctx.textAlign = "right";
                ctx.fillText("YATAŞ GROUP", viewport.width - 20, viewport.height - 20);
                ctx.restore();

                // Görüntüyü ana ekrandaki canvas'a aktar
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                const destCtx = canvas.getContext('2d');
                destCtx.drawImage(offscreenCanvas, 0, 0);

                pageObj.rendered = true;
                
                // Bellek temizleme
                offscreenCanvas.width = 0;
                offscreenCanvas.height = 0;
            } catch (err) {
                console.error(`Sayfa ${pageNum} render edilirken hata oluştu:`, err);
            } finally {
                pageObj.rendering = false;
            }
        }

        // --- 3D PERSPEKTİF VE YELPAZE (COVER FLOW) MEKANİĞİ ---
        
        function updateBookDisplay() {
            pageIndicator.textContent = `${state.currentPage} / ${state.totalPages}`;

            for (let i = 1; i <= state.totalPages; i++) {
                const pageObj = state.renderedPages.get(i);
                if (!pageObj) continue;

                const diff = i - state.currentPage;
                const container = pageObj.container;

                if (diff === 0) {
                    // Aktif Sayfa (Tam Merkezde ve En Önde)
                    container.style.transform = `translate3d(0, 0, 0) rotateY(0deg)`;
                    container.style.opacity = "1";
                    container.style.zIndex = "5";
                    container.style.pointerEvents = "auto";
                    renderHighQualityPage(i);
                } else {
                    // Diğer Sayfalar - Yay Yayılma Etkisi (Coveflow)
                    const direction = diff > 0 ? 1 : -1;
                    const absDiff = Math.abs(diff);
                    
                    // Sağa ve sola doğru kusursuz, dengeli açılı bükülme
                    const transX = direction * 140 + (diff * 25);
                    const rotY = -direction * 45 - (diff * 2);
                    const transZ = -150 * absDiff;

                    container.style.transform = `translate3d(${transX}px, 0, ${transZ}px) rotateY(${rotY}deg)`;
                    container.style.opacity = Math.max(0.1, 1 - absDiff * 0.25).toString();
                    container.style.zIndex = (10 - absDiff).toString();
                    container.style.pointerEvents = "none";

                    // Bir sonraki ve bir önceki sayfayı önden sessizce render et (Pre-load)
                    if (absDiff === 1) {
                        renderHighQualityPage(i);
                    }
                }
            }
        }

        // --- MÜKEMMEL SİMETRİK ZOOM & PAN MATEMATİĞİ ---
        
        function updateTransform() {
            if (scale <= 1) {
                scale = 1;
                posX = 0;
                posY = 0;
                zoomContainer.style.transform = `translate3d(0px, 0px, 0px) scale(1)`;
            } else {
                // Görselin dışına taşmayı ve kaymayı önleyen tamamen simetrik sınırlar
                const maxPanX = ((scale - 1) * scene.clientWidth) / 2;
                const maxPanY = ((scale - 1) * scene.clientHeight) / 2;

                // Eşit oranlı kıstırma (-maxPanX ile +maxPanX arasında)
                posX = Math.max(-maxPanX, Math.min(posX, maxPanX));
                posY = Math.max(-maxPanY, Math.min(posY, maxPanY));

                zoomContainer.style.transform = `translate3d(${posX}px, ${posY}px, 0px) scale(${scale})`;
            }
        }

        function resetZoom() {
            scale = 1;
            posX = 0;
            posY = 0;
            updateTransform();
        }

        function zoomToPoint(amount, clientX, clientY) {
            const oldScale = scale;
            scale = Math.max(1, Math.min(scale + amount, 6)); // Minimum 1x, maksimum 6x zoom

            if (scale > 1) {
                const rect = scene.getBoundingClientRect();
                const mouseX = clientX - (rect.left + rect.width / 2);
                const mouseY = clientY - (rect.top + rect.height / 2);

                // Zoom yapılan noktayı merkeze alarak genişleme hesabı
                posX -= mouseX * (scale / oldScale - 1);
                posY -= mouseY * (scale / oldScale - 1);
            }
            updateTransform();
        }

        // --- BİRLEŞTİRİLMİŞ ETKİLEŞİM VE TOUCH ETKİNLİKLERİ ---
        
        // Fare ve Dokunmatik Sürükleme Başlangıcı
        function startDrag(e) {
            if (e.touches && e.touches.length === 2) {
                isPinching = true;
                startDist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                return;
            }
            
            isDragging = true;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            startX = clientX - posX;
            startY = clientY - posY;
        }

        // Birleştirilmiş Sürükleme ve İki Parmak Zoom Hareketi
        function handleDrag(e) {
            if (isPinching && e.touches && e.touches.length === 2) {
                e.preventDefault();
                const dist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                const delta = (dist - startDist) * 0.007;
                const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                
                zoomToPoint(delta, midX, midY);
                startDist = dist;
                return;
            }

            if (!isDragging) return;
            e.preventDefault();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            posX = clientX - startX;
            posY = clientY - startY;
            updateTransform();
        }

        function endDrag() {
            isDragging = false;
            isPinching = false;
        }

        // --- TETİKLEYİCİ LİSTENER'LAR ---

        // Mouse Pan Olayları
        scene.addEventListener('mousedown', startDrag);
        window.addEventListener('mousemove', handleDrag);
        window.addEventListener('mouseup', endDrag);

        // Birleştirilmiş Mobil Dokunmatik Olayları
        scene.addEventListener('touchstart', startDrag, { passive: false });
        scene.addEventListener('touchmove', handleDrag, { passive: false });
        scene.addEventListener('touchend', endDrag);

        // Mouse Wheel Zoom Desteği
        scene.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = -e.deltaY * 0.0015;
            zoomToPoint(delta, e.clientX, e.clientY);
        }, { passive: false });

        // Çift Tıklama ile Hızlı Zoom Giriş / Çıkış
        scene.addEventListener('dblclick', (e) => {
            if (scale > 1) {
                resetZoom();
            } else {
                zoomToPoint(1.8, e.clientX, e.clientY);
            }
        });

        // Kontrol Butonları İşlevleri
        prevBtn.addEventListener('click', () => {
            if (state.currentPage > 1) {
                state.currentPage--;
                pageFlipSound.play();
                updateBookDisplay();
                resetZoom();
            }
        });

        nextBtn.addEventListener('click', () => {
            if (state.currentPage < state.totalPages) {
                state.currentPage++;
                pageFlipSound.play();
                updateBookDisplay();
                resetZoom();
            }
        });

        zoomInBtn.addEventListener('click', () => {
            const rect = scene.getBoundingClientRect();
            zoomToPoint(0.5, rect.left + rect.width / 2, rect.top + rect.height / 2);
        });

        zoomOutBtn.addEventListener('click', () => {
            const rect = scene.getBoundingClientRect();
            zoomToPoint(-0.5, rect.left + rect.width / 2, rect.top + rect.height / 2);
        });

        // Klavye ile Yönetim Desteği
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a') {
                prevBtn.click();
            } else if (e.key === 'ArrowRight' || e.key === 'd') {
                nextBtn.click();
            } else if (e.key === 'Escape') {
                resetZoom();
            }
        });

        // Pencere Boyutu Değiştiğinde Kitabı ve Sayfaları Yeniden Hesapla
        window.addEventListener('resize', () => {
            if (state.pdfDoc) {
                state.pdfDoc.getPage(1).then(firstPage => {
                    calculateBookDimensions(firstPage);
                    state.renderedPages.forEach((pageObj, pageNum) => {
                        pageObj.container.style.width = `${state.bookWidth}px`;
                        pageObj.container.style.height = `${state.bookHeight}px`;
                        pageObj.rendered = false; // Yeniden ölçeklendirme için render bayrağını sıfırla
                    });
                    updateBookDisplay();
                });
            }
        });

        // Sistemi Başlat
        init();
    </script>
</body>
</html>
